# Эталоны ulaw 8 kHz — положите свои записи «да» / «нет» с вашей линии.
# Пути относительно этого файла. Без STT, без текста — только сходство звука.

references:
  min_score: 0.55   # мин. cosine similarity к лучшему эталону
  min_margin: 0.08  # насколько победитель лучше противоположной группы

  positive:
    - refs/positive/da.ulaw
    - refs/positive/aga.ulaw
    - refs/positive/khorosho.ulaw

  negative:
    - refs/negative/net.ulaw
    - refs/negative/ne_nado.ulaw
    - refs/negative/ne_hochu.ulaw
