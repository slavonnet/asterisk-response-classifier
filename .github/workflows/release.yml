name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            asset: arc-linux-amd64
          - goos: linux
            goarch: arm64
            asset: arc-linux-arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - run: go test -count=1 ./...

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          VERSION: ${{ github.ref_name }}
        run: |
          go build -trimpath -ldflags="-s -w -X main.version=${VERSION}" -o arc ./cmd/arc
          mkdir -p bundle/config/refs
          cp arc bundle/arc
          cp config/references.yaml bundle/config/
          cp -r config/refs/README.md bundle/config/refs/
          cp deploy/arc.service bundle/
          cp scripts/install-from-release.sh bundle/install.sh
          chmod +x bundle/arc bundle/install.sh
          tar -czf ${{ matrix.asset }}.tar.gz -C bundle .

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}.tar.gz

  publish:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
