name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  VOSK_MODEL_URL: https://alphacephei.com/vosk/models/vosk-model-small-ru-0.22.zip
  VOSK_VER: "0.3.45"

jobs:
  release:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            vosk_arch: x86_64
            asset: arc-linux-amd64
          - runner: ubuntu-24.04-arm
            vosk_arch: aarch64
            asset: arc-linux-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install libvosk
        run: |
          curl -fsSL "https://github.com/alphacep/vosk-api/releases/download/v${VOSK_VER}/vosk-linux-${VOSK_ARCH}-${VOSK_VER}.zip" -o vosk.zip
          unzip vosk.zip
          sudo cp vosk-linux-${VOSK_ARCH}-${VOSK_VER}/libvosk.so /usr/local/lib/
          sudo ldconfig

      - name: Download speech model (bundled in release, no server setup)
        run: |
          curl -fsSL "$VOSK_MODEL_URL" -o model.zip
          unzip -q model.zip
          mv vosk-model-small-ru-0.22 model

      - name: Test
        run: go test -count=1 ./...

      - name: Build arc
        env:
          CGO_ENABLED: "1"
          VERSION: ${{ github.ref_name }}
        run: |
          go mod tidy
          go build -tags vosk -trimpath \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o arc ./cmd/arc

      - name: Pack full bundle (binary + lib + model + config)
        env:
          VOSK_ARCH: ${{ matrix.vosk_arch }}
        run: |
          mkdir -p bundle/{lib,config,model}
          cp arc bundle/arc
          cp vosk-linux-${VOSK_ARCH}-${VOSK_VER}/libvosk.so bundle/lib/
          cp -r model/* bundle/model/
          cp config/phrases.yaml bundle/config/
          cp deploy/arc.service bundle/
          cp scripts/install-from-release.sh bundle/install.sh
          chmod +x bundle/arc bundle/install.sh
          tar -czf ${{ matrix.asset }}.tar.gz -C bundle .
          sha256sum ${{ matrix.asset }}.tar.gz > ${{ matrix.asset }}.tar.gz.sha256

      - name: Upload tarball
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            ${{ matrix.asset }}.tar.gz
            ${{ matrix.asset }}.tar.gz.sha256

  publish:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*.tar.gz dist/*.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
