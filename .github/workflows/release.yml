name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            asset: arc-linux-amd64
          - goos: linux
            goarch: arm64
            asset: arc-linux-arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test -count=1 ./...
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          VERSION: ${{ github.ref_name }}
        run: |
          go build -trimpath -ldflags="-s -w -X main.version=${VERSION}" -o arc ./cmd/arc
          mkdir -p bundle/config/sentences/ru bundle/deploy bundle/scripts
          cp arc bundle/
          cp config/ivr.yaml bundle/config/
          cp config/sentences/ru/ivr.yaml bundle/config/sentences/ru/
          cp deploy/*.service bundle/deploy/
          cp scripts/run-speech-to-phrase.sh bundle/scripts/
          chmod +x bundle/scripts/run-speech-to-phrase.sh
          tar -czf ${{ matrix.asset }}.tar.gz -C bundle .
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}.tar.gz

  publish:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
